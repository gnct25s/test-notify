apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: test-notice-app
  name: test-notice-app
  namespace: test-notice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-notice-app
  template:
    metadata:
      labels:
        app: test-notice-app
    spec:
      containers:
        - image: containous/whoami:v1.5.0
          name: whoami

